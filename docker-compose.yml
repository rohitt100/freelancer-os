version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: freelancer_os_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelancer_os
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: freelancer_os_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  postgres_data:
